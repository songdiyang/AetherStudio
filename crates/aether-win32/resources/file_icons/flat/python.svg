<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-label="Python file icon (flat)">
  <title>Python File (Flat)</title>
  <!-- File body: rounded rectangle with corner fold -->
  <path d="M5.5 2.5 L14.5 2.5 L20.5 8.5 L20.5 20.5 Q20.5 21.5 19.5 21.5 L5.5 21.5 Q4.5 21.5 4.5 20.5 L4.5 3.5 Q4.5 2.5 5.5 2.5 Z"
        fill="#3776AB"/>
  <!-- Corner fold highlight -->
  <path d="M14.5 2.5 L20.5 8.5 L15.5 8.5 Q14.5 8.5 14.5 7.5 Z"
        fill="#FFD43B"/>
  <!-- Python brand mark: two interlocking circles -->
  <circle cx="9.5" cy="15" r="3" fill="#FFD43B"/>
  <circle cx="14.5" cy="15" r="3" fill="#FFFFFF" fill-opacity="0.92"/>
  <!-- Subtle separator line through the middle -->
  <path d="M9.5 13.5 L14.5 16.5" stroke="#3776AB" stroke-width="0.6" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
