<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-label="Java file icon (skeuomorphic)">
  <title>Java File (Skeuomorphic)</title>
  <defs>
    <!-- File body gradient: warm orange → deep red-orange -->
    <linearGradient id="java-file-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F89820"/>
      <stop offset="100%" stop-color="#A8420E"/>
    </linearGradient>
    <!-- Corner fold gradient -->
    <linearGradient id="java-fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD8A8"/>
      <stop offset="100%" stop-color="#E76F00"/>
    </linearGradient>
    <!-- Cup body gradient: porcelain white -->
    <linearGradient id="java-cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E0E0E0"/>
    </linearGradient>
    <!-- Cup handle gradient -->
    <linearGradient id="java-handle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0F0F0"/>
      <stop offset="100%" stop-color="#C8C8C8"/>
    </linearGradient>
    <!-- Steam gradient (translucent white) -->
    <linearGradient id="java-steam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="java-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0" dy="0.5" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#java-shadow)">
    <!-- File body -->
    <path d="M5.5 2.5 L14.5 2.5 L20.5 8.5 L20.5 20.5 Q20.5 21.5 19.5 21.5 L5.5 21.5 Q4.5 21.5 4.5 20.5 L4.5 3.5 Q4.5 2.5 5.5 2.5 Z"
          fill="url(#java-file-body)" stroke="#5C2406" stroke-width="0.5"/>
    <!-- Corner fold -->
    <path d="M14.5 2.5 L20.5 8.5 L15.5 8.5 Q14.5 8.5 14.5 7.5 Z"
          fill="url(#java-fold)" stroke="#5C2406" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Steam wisps behind cup -->
    <path d="M10 9 Q11 8 10 7 Q9 6 10 5" stroke="url(#java-steam)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <path d="M13 9 Q14 8 13 7 Q12 6 13 5" stroke="url(#java-steam)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Cup body -->
    <path d="M8 13 L16 13 L15.5 19 Q15.4 20 14.4 20 L9.6 20 Q8.6 20 8.5 19 Z"
          fill="url(#java-cup)" stroke="#5C2406" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Cup handle -->
    <path d="M15.7 14.2 Q18 14.5 18 16.2 Q18 17.8 15.7 18.1"
          stroke="url(#java-handle)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- Cup highlight -->
    <path d="M9 14 L9.4 18.5" stroke="#FFFFFF" stroke-width="0.6" stroke-linecap="round" opacity="0.7"/>
  </g>
  <!-- Top file highlight -->
  <path d="M5.5 3 L14.5 3 L14.5 4 L5.5 4 Q4.8 4 4.8 4.5 L4.8 5 Q4.6 4 5.5 3 Z" fill="#FFFFFF" opacity="0.2"/>
</svg>
