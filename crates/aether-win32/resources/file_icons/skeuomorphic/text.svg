<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-label="Text file icon (skeuomorphic)">
  <title>Text File (Skeuomorphic)</title>
  <defs>
    <!-- File body gradient: paper white → soft gray -->
    <linearGradient id="txt-file-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#C7CCD4"/>
    </linearGradient>
    <!-- Corner fold gradient -->
    <linearGradient id="txt-fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5E7EB"/>
      <stop offset="100%" stop-color="#9CA3AF"/>
    </linearGradient>
    <!-- Text line gradient (slight depth) -->
    <linearGradient id="txt-line" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <filter id="txt-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.5"/>
      <feOffset dx="0" dy="0.5" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#txt-shadow)">
    <!-- File body -->
    <path d="M5.5 2.5 L14.5 2.5 L20.5 8.5 L20.5 20.5 Q20.5 21.5 19.5 21.5 L5.5 21.5 Q4.5 21.5 4.5 20.5 L4.5 3.5 Q4.5 2.5 5.5 2.5 Z"
          fill="url(#txt-file-body)" stroke="#4B5563" stroke-width="0.5"/>
    <!-- Corner fold -->
    <path d="M14.5 2.5 L20.5 8.5 L15.5 8.5 Q14.5 8.5 14.5 7.5 Z"
          fill="url(#txt-fold)" stroke="#4B5563" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Text lines -->
    <rect x="7.5" y="12" width="9" height="1.5" rx="0.7" fill="url(#txt-line)"/>
    <rect x="7.5" y="14.6" width="9" height="1.5" rx="0.7" fill="url(#txt-line)"/>
    <rect x="7.5" y="17.2" width="6" height="1.5" rx="0.7" fill="url(#txt-line)"/>
  </g>
  <!-- Top file highlight -->
  <path d="M5.5 3 L14.5 3 L14.5 4 L5.5 4 Q4.8 4 4.8 4.5 L4.8 5 Q4.6 4 5.5 3 Z" fill="#FFFFFF" opacity="0.55"/>
</svg>
