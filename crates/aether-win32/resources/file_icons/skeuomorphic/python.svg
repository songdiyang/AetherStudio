<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" role="img" aria-label="Python file icon (skeuomorphic)">
  <title>Python File (Skeuomorphic)</title>
  <defs>
    <!-- File body gradient: dark blue → bright blue -->
    <linearGradient id="py-file-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4A8DC2"/>
      <stop offset="100%" stop-color="#1F4E78"/>
    </linearGradient>
    <!-- Corner fold gradient: bright yellow → orange -->
    <linearGradient id="py-fold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE873"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </linearGradient>
    <!-- Yellow circle gradient -->
    <radialGradient id="py-yellow-orb" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#FFEC8A"/>
      <stop offset="100%" stop-color="#F0B90B"/>
    </radialGradient>
    <!-- White circle gradient -->
    <radialGradient id="py-white-orb" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D6E4F0"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="py-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0" dy="0.6" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#py-shadow)">
    <!-- File body -->
    <path d="M5.5 2.5 L14.5 2.5 L20.5 8.5 L20.5 20.5 Q20.5 21.5 19.5 21.5 L5.5 21.5 Q4.5 21.5 4.5 20.5 L4.5 3.5 Q4.5 2.5 5.5 2.5 Z"
          fill="url(#py-file-body)" stroke="#0F2D47" stroke-width="0.5"/>
    <!-- Corner fold -->
    <path d="M14.5 2.5 L20.5 8.5 L15.5 8.5 Q14.5 8.5 14.5 7.5 Z"
          fill="url(#py-fold)" stroke="#8A6708" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Yellow snake head -->
    <circle cx="9.7" cy="15" r="3" fill="url(#py-yellow-orb)" stroke="#8A6708" stroke-width="0.4"/>
    <!-- White snake head -->
    <circle cx="14.3" cy="15" r="3" fill="url(#py-white-orb)" stroke="#1F4E78" stroke-width="0.4"/>
    <!-- Eyes (tiny pupils) -->
    <circle cx="10.3" cy="14.2" r="0.5" fill="#1F4E78"/>
    <circle cx="13.7" cy="14.2" r="0.5" fill="#1F4E78"/>
    <!-- Interlocking diagonal accent -->
    <path d="M11.4 13.4 L12.6 16.6" stroke="#1F4E78" stroke-width="0.6" stroke-linecap="round" opacity="0.55"/>
  </g>
  <!-- Top highlight on file body -->
  <path d="M5.5 3 L14.5 3 L14.5 4 L5.5 4 Q4.8 4 4.8 4.5 L4.8 5 Q4.6 4 5.5 3 Z" fill="#FFFFFF" opacity="0.18"/>
</svg>
