name: Restrict Main PR Source

on:
  pull_request:
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify source branch is dev
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ 错误：只有 dev 分支可以合并到 main"
            echo "当前源分支: ${{ github.head_ref }}"
            exit 1
          fi
          echo "✅ 源分支是 dev，允许合并到 main"
